<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Social Media Meta Tags -->
    <title>Mozes Official Website</title>
    <meta property="og:title" content="Mozes Home">
    <meta property="og:description" content=" The Official Website ">
    
    <!-- DIRECT RAW IMAGE URL (Fixed for Facebook/WhatsApp) -->
    <meta property="og:image" content="https://raw.githubusercontent.com/Mozesofc/Mozes/main/image1.jpg">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/Mozesofc/Mozes/main/image1.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Mozes Official Website Banner">
    
    <meta property="og:url" content="https://mozesmusic.com">
    <meta property="og:type" content="website">

    <!-- Styles and Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --snap-type: y mandatory; }
        html { scroll-snap-type: var(--snap-type); scroll-behavior: smooth; }
        body { background-color: #000; color: #fff; font-family: 'Lato', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Background Glow */
        .glow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .ambient-glow { position: absolute; width: 140vmin; height: 140vmin; filter: blur(100px) saturate(2); opacity: 0; transition: opacity 1.5s ease; will-change: transform, opacity; }
        .ambient-glow.active { opacity: 0.4; animation: fluidMove 25s ease-in-out infinite; }
        @keyframes fluidMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, -5%) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Central Image */
        .fixed-image-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; pointer-events: none; transition: opacity 0.6s ease; }
        .image-wrapper { position: relative; width: 85vw; max-width: 500px; aspect-ratio: 1/1; pointer-events: auto; }
        .main-image { position: absolute; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1); transform: scale(0.9); filter: blur(10px); cursor: pointer; }
        .main-image.active { opacity: 1; transform: scale(1); filter: blur(0px); z-index: 20; }

        /* Layout */
        .scroll-section { height: 100vh; scroll-snap-align: start; }
        .social-section { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; position: relative; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); }
        .social-link { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); transition: 0.4s; margin: 0.4rem 0; }
        .social-link:hover { color: #fff; transform: scale(1.05); letter-spacing: 0.4em; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(15,15,15,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem; border-radius: 4rem; display: flex; }
        .nav-btn { padding: 0.6rem 1.5rem; border-radius: 3rem; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

        /* Releases Page */
        #releases-page { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; opacity: 0; transition: 0.5s; overflow-y: auto; padding: 6rem 2rem; }
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .release-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.5rem; overflow: hidden; transition: 0.4s; cursor: pointer; }
        .release-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }

        /* Modal */
        #modal { position: fixed; inset: 0; z-index: 3000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        #modal.active { display: flex; }
        .modal-content { background: rgba(20,20,20,0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; width: 100%; max-width: 700px; padding: 2rem; position: relative; }
        .track-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.7rem; border-radius: 2rem; text-align: center; font-size: 0.65rem; letter-spacing: 1px; transition: 0.3s; color: rgba(255,255,255,0.5); }
        .track-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>

    <div class="glow-container">
        <img id="glow1" src="" class="ambient-glow active">
        <img id="glow2" src="" class="ambient-glow">
    </div>

    <div id="imageLayer" class="fixed-image-layer">
        <div class="image-wrapper" onclick="openModal(currentIndex)">
            <img id="img1" src="" class="main-image active">
            <img id="img2" src="" class="main-image">
        </div>
    </div>

    <div id="home-view">
        <div id="scroll-container"></div>
        <section class="social-section">
            <h2 class="text-3xl font-thin tracking-[0.4em] uppercase mb-12">Connect</h2>
            <div class="flex flex-col gap-4 text-center">
                <a href="https://open.spotify.com/artist/4uRpFQ2D51xyz2O4V9pqon" target="_blank" class="social-link">Spotify</a>
                <a href="https://www.youtube.com/@Mozesofc" target="_blank" class="social-link">YouTube</a>
                <a href="https://soundcloud.com/mozesofc" target="_blank" class="social-link">SoundCloud</a>
                <a href="https://www.instagram.com/Mozesofc" target="_blank" class="social-link">Instagram</a>
                <a href="mailto:Info@mozesmusic.com" class="mt-8 text-white/40 hover:text-white text-xs tracking-widest">Info@mozesmusic.com</a>
            </div>
        </section>
    </div>

    <div id="releases-page">
        <div class="releases-grid" id="releasesGrid"></div>
    </div>

    <nav class="bottom-nav">
        <button onclick="changePage('home')" id="btn-home" class="nav-btn active">Mozes</button>
        <button onclick="changePage('releases')" id="btn-releases" class="nav-btn">Releases</button>
    </nav>

    <div id="modal">
        <div class="absolute inset-0 bg-black/80" onclick="closeModal()"></div>
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-white/30 text-2xl hover:text-white">&times;</button>
            <h3 id="modalTitle" class="text-sm font-light tracking-widest uppercase mb-6 border-l-2 border-white/20 pl-4">Track Title</h3>
            <div class="aspect-video bg-black rounded-lg overflow-hidden border border-white/10 mb-6">
                <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <a id="btnSpotify" href="#" target="_blank" class="track-btn">Spotify</a>
                <a id="btnSC" href="#" target="_blank" class="track-btn">SoundCloud</a>
                <a id="btnYT" href="#" target="_blank" class="track-btn">YouTube</a>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { src: "image1.jpg", title: "Mozes - BALAGAN", yt: "yng3GffPK_U", spotify: "https://open.spotify.com/track/4jH1B5l5o0R7vX8m9P6Dq5", sc: "https://soundcloud.com/mozesofc/balagan" },
            { src: "image2.jpg", title: "Cosmic Gate - Brave (Mozes Remix)", yt: "kO8ylPtWT14", spotify: "https://open.spotify.com/track/5uRpFQ2D51xyz2O4V9pqon", sc: "https://soundcloud.com/mozesofc/brave-remix" },
            { src: "image3.jpg", title: "James Hype - Dont Wake Me Up (Mozes Remix)", yt: "57W4t-hN3Vo", spotify: "https://open.spotify.com/album/4jH1B5l5o0R7vX8m9P6Dq5", sc: "https://soundcloud.com/mozesofc/dont-wake-me-up" },
            { src: "image4.jpg", title: "Tayri - Black Sheep (Mozes Remix)", yt: "DKCr5GG4PXA", sc: "https://soundcloud.com/mozesofc/black-sheep" },
            { src: "image5.jpg", title: "Mozes - What Took You So Long (Remix)", yt: "gcReNaVNd4E", sc: "https://soundcloud.com/mozesofc/what-took-you-so-long" },
            { src: "image6.jpg", title: "Mozes & Mushy - Found Myself", yt: "It-mN5HDWvA", sc: "https://soundcloud.com/mozesofc/found-myself" }
        ];

        let currentIndex = 0;
        let activeLayer = 1;

        // Setup Home Sections
        const container = document.getElementById('scroll-container');
        tracks.forEach(() => {
            const sec = document.createElement('div');
            sec.className = 'scroll-section';
            container.appendChild(sec);
        });

        // Setup Grid
        const grid = document.getElementById('releasesGrid');
        tracks.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = 'release-card';
            card.onclick = () => openModal(i);
            card.innerHTML = `<img src="${t.src}" class="w-full aspect-square object-cover opacity-80"><div class="p-3 text-[10px] tracking-tighter uppercase opacity-60">${t.title}</div>`;
            grid.appendChild(card);
        });

        // Initial state
        document.getElementById('img1').src = tracks[0].src;
        document.getElementById('glow1').src = tracks[0].src;

        window.addEventListener('scroll', () => {
            const idx = Math.min(tracks.length, Math.floor((window.scrollY + window.innerHeight/2) / window.innerHeight));
            
            if (idx >= tracks.length) {
                document.getElementById('imageLayer').style.opacity = "0";
            } else {
                document.getElementById('imageLayer').style.opacity = "1";
                if (idx !== currentIndex) {
                    currentIndex = idx;
                    const nextImg = activeLayer === 1 ? document.getElementById('img2') : document.getElementById('img1');
                    const currImg = activeLayer === 1 ? document.getElementById('img1') : document.getElementById('img2');
                    const nextGlow = activeLayer === 1 ? document.getElementById('glow2') : document.getElementById('glow1');
                    const currGlow = activeLayer === 1 ? document.getElementById('glow1') : document.getElementById('glow2');
                    
                    nextImg.src = tracks[idx].src;
                    nextGlow.src = tracks[idx].src;
                    nextImg.classList.add('active');
                    nextGlow.classList.add('active');
                    currImg.classList.remove('active');
                    currGlow.classList.remove('active');
                    activeLayer = activeLayer === 1 ? 2 : 1;
                }
            }
        });

        function changePage(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${page}`).classList.add('active');

            if (page === 'home') {
                document.getElementById('releases-page').style.display = 'none';
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('imageLayer').style.opacity = '1';
                window.scrollTo(0, 0);
            } else {
                document.getElementById('home-view').style.display = 'none';
                document.getElementById('releases-page').style.display = 'block';
                document.getElementById('releases-page').style.opacity = '1';
                document.getElementById('imageLayer').style.opacity = '0';
            }
        }

        function openModal(i) {
            const t = tracks[i];
            document.getElementById('modalTitle').innerText = t.title;
            document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${t.yt}?autoplay=1`;
            document.getElementById('btnSpotify').href = t.spotify || "#";
            document.getElementById('btnSC').href = t.sc || "#";
            document.getElementById('btnYT').href = `https://youtube.com/watch?v=${t.yt}`;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('videoFrame').src = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
