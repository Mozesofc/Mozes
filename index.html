    <style>
        :root { --snap-type: y mandatory; }
        html { scroll-snap-type: var(--snap-type); scroll-behavior: smooth; }
        body { background-color: #000; color: #fff; font-family: 'Lato', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        .glow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1; pointer-events: none; overflow: hidden; }
        .ambient-glow { position: absolute; width: 140vmin; height: 140vmin; object-fit: cover; filter: blur(100px) saturate(3) contrast(1.2); opacity: 0; transition: opacity 1.5s ease-in-out; will-change: transform, opacity; }
        @keyframes fluidMove { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 33% { transform: translate(5%, -5%) scale(1.05) rotate(2deg); } 66% { transform: translate(-3%, 7%) scale(0.95) rotate(-1deg); } 100% { transform: translate(0, 0) scale(1) rotate(0deg); } }
        .ambient-glow.active { opacity: 0.45; animation: fluidMove 25s ease-in-out infinite; }

        .fixed-image-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; pointer-events: none; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .image-wrapper { position: relative; width: 85vw; max-width: 550px; aspect-ratio: 1 / 1; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        .main-image { position: absolute; width: 100%; height: 100%; object-fit: contain; cursor: pointer; opacity: 0; transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1); transform: scale(0.9) translateY(20px); filter: blur(15px); }
        .main-image.active { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); z-index: 20; }

        /* Social Header - First Page Top */
        .hero-socials { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; gap: 2rem; opacity: 1; transition: opacity 0.5s ease; }
        .hero-social-link { color: rgba(255,255,255,0.4); transition: all 0.3s ease; }
        .hero-social-link:hover { color: #fff; transform: translateY(-2px); }

        .scroll-section { height: 100vh; scroll-snap-align: start; }
        
        /* Layouts for sub-pages */
        .page-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 1000; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.5s ease; padding: 6rem 2rem; box-sizing: border-box; }
        
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2.5rem; max-width: 1300px; margin: 0 auto; }
        .release-card { background: rgba(255,255,255,0.03); border-radius: 0.5rem; overflow: hidden; transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .release-card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); }

        /* News Section Styles */
        .news-item { margin-bottom: 4rem; max-width: 900px; margin-left: auto; margin-right: auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1rem; background: #111; border: 1px solid rgba(255,255,255,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .social-section { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 100; background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 75%); }
        .social-link { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); transition: all 0.4s ease; margin: 0.5rem 0; display: block; }
        .social-link:hover { color: #fff; letter-spacing: 0.4em; transform: scale(1.05); }

        .scroll-arrow { color: rgba(255, 255, 255, 0.2); cursor: pointer; transition: all 0.3s ease; padding: 10px; }
        .scroll-arrow:hover { color: #fff; transform: scale(1.3); }

        .bottom-nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.35rem; border-radius: 4rem; display: flex; gap: 0.2rem; }
        .nav-btn { padding: 0.6rem 1.4rem; border-radius: 3rem; font-size: 0.7rem; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; color: rgba(255, 255, 255, 0.4); cursor: pointer; white-space: nowrap; }
        .nav-btn.active { background: rgba(255, 255, 255, 0.12); color: #fff; }

        .scroll-dot { width: 4px; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .scroll-dot.milestone { width: 8px; height: 8px; background: rgba(255, 255, 255, 0.3); }
        .scroll-dot.active { background: #fff; transform: scale(1.8); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        #modal { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; pointer-events: none; z-index: 3000; }
        #modal.active { opacity: 1; pointer-events: auto; }
        .liquid-glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(60px) saturate(1.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; }
        .modal-nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.5; transition: all 0.3s ease; cursor: pointer; z-index: 100; }
        .modal-nav-arrow:hover { opacity: 1; background: rgba(255,255,255,0.15); }
        .arrow-prev { left: -60px; } .arrow-next { right: -60px; }
        @media (max-width: 768px) { .arrow-prev { left: 10px; } .arrow-next { right: 10px; } .modal-nav-arrow { width: 35px; height: 35px; background: rgba(0,0,0,0.4); } }

        .track-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); padding: 0.6rem 1rem; border-radius: 2rem; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; transition: all 0.4s ease; display: flex; align-items: center; justify-content: center; gap: 0.4rem; color: rgba(255,255,255,0.4); }
        .btn-spotify:hover { background: rgba(30, 215, 96, 0.15); border-color: #1ED760; color: #1ED760; }
        .btn-soundcloud:hover { background: rgba(255, 51, 0, 0.15); border-color: #FF3300; color: #FF3300; }
        .btn-youtube:hover { background: rgba(255, 0, 0, 0.15); border-color: #FF0000; color: #FF0000; }
    </style>

            { src: "image18.jpg", title: "Mozes - Trust Me (DnB Remix)", youtubeId: "Lk1KZFLwV3Q", spotify: "https://open.spotify.com/track/1d8Z4FpBiPmLzF15mTrUbA?si=f963e61c2ff840e5", sc: "https://soundcloud.com/mozesofc/mozes-trust-me-the-dnb-4" },
            { src: "image19.jpg", title: "Mozes & Jazz - Wealth, Power & Fame", youtubeId: "ecL3Out6ja8", spotify: "https://open.spotify.com/track/5axqxREDfJF5vRibAghSWP?si=f5b9252112f24dd2", sc: "https://soundcloud.com/mozesofc/mozes-jazz-wealth-power-and-fame" },
            { src: "image20.jpg", title: "Mozes - Late at Night", youtubeId: "4U_tvQ4WSRo", spotify: "https://open.spotify.com/track/7bUSduMOSEcBORTvDZcq5J?si=abebea2b300f44ca", sc: "https://soundcloud.com/mozesofc/mozes-late-at-night-radio-edit" }
        ];

        let currentIndex = 0; let activeLayer = 1; let currentActivePage = 'home'; let isModalOpen = false; let modalIndex = 0;
        const img1 = document.getElementById('img1'); const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1'); const glow2 = document.getElementById('glow2');
        const scrollIndicator = document.getElementById('scrollIndicator'); const releasesGrid = document.getElementById('releasesGrid');
        const scrollArea = document.getElementById('scrollArea');
        const heroSocials = document.getElementById('hero-socials');

        const totalHomeSections = tracks.length + 1;
        
        for(let i=0; i < tracks.length; i++) {
            const sec = document.createElement('div'); sec.className = 'scroll-section'; scrollArea.appendChild(sec);
        }

        for(let i=0; i < totalHomeSections; i++) {
            const isMilestone = i % 5 === 0 || i === totalHomeSections - 1;
            const dot = document.createElement('div'); 
            dot.className = `scroll-dot ${i === 0 ? 'active' : ''} ${isMilestone ? 'milestone' : ''}`; 
            dot.id = `dot-${i}`;
            dot.onclick = () => window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
            scrollIndicator.appendChild(dot);
        }

        tracks.forEach((track, i) => {
            const card = document.createElement('div'); card.className = 'release-card'; card.onclick = () => openModal(i);
            card.innerHTML = `<img src="${track.src}" class="w-full aspect-square object-cover">
                             <div class="p-4 text-[9px] tracking-[0.2em] uppercase text-white/80 truncate text-left" dir="ltr">${track.title}</div>`;
            releasesGrid.appendChild(card);
        });

        img1.src = tracks[0].src; glow1.src = tracks[0].src; img2.src = tracks[0].src; glow2.src = tracks[0].src;

        window.addEventListener('scroll', () => {
            if (currentActivePage !== 'home' && currentActivePage !== 'social') return;
            const scrollPos = window.scrollY;
            const idx = Math.min(totalHomeSections - 1, Math.floor((scrollPos + window.innerHeight/2) / window.innerHeight));
            
            // Hide hero socials when scrolling down
            if (scrollPos > 100) heroSocials.style.opacity = "0";
            else heroSocials.style.opacity = "1";

            if (idx === tracks.length) document.getElementById('imageLayer').style.opacity = "0";
            else if (idx < tracks.length) {
                document.getElementById('imageLayer').style.opacity = "1";
                if (idx !== currentIndex) { currentIndex = idx; updateUI(idx); }
            }
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
        });

        function scrollToExtreme(pos) {
            let target = 0;
            if (pos === 'start') target = 0;
            else if (pos === 'last-image') target = (tracks.length - 1) * window.innerHeight;
            window.scrollTo({ top: target, behavior: 'smooth' });
        }

        function updateUI(idx) {
            const [nextImg, currImg] = activeLayer === 1 ? [img2, img1] : [img1, img2];
            const [nextGlow, currGlow] = activeLayer === 1 ? [glow2, glow1] : [glow1, glow2];
            nextImg.src = tracks[idx].src; nextGlow.src = tracks[idx].src;
            nextImg.classList.add('active'); nextGlow.classList.add('active');
            currImg.classList.remove('active'); currGlow.classList.remove('active');
            activeLayer = activeLayer === 1 ? 2 : 1;
        }

        function navigate(page) {
            currentActivePage = page;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
            
            // Hide all sub-pages first
            document.querySelectorAll('.page-container').forEach(p => {
                p.style.opacity = "0";
                setTimeout(() => p.style.display = "none", 500);
            });

            if (page === 'home' || page === 'social') {
                document.documentElement.style.scrollSnapType = 'none';
                document.getElementById('side-nav').style.opacity = "1";
                const target = page === 'home' ? 0 : document.body.scrollHeight;
                window.scrollTo({ top: target, behavior: 'smooth' });
                setTimeout(() => { document.documentElement.style.scrollSnapType = 'y mandatory'; }, 1000);
            } else {
                const targetPage = document.getElementById(`${page}-page`);
                targetPage.style.display = "block";
                setTimeout(() => targetPage.style.opacity = "1", 10);
                document.documentElement.style.scrollSnapType = 'none';
                document.getElementById('imageLayer').style.opacity = "0";
                document.getElementById('side-nav').style.opacity = "0";
            }
        }

        function openModal(index) {
            modalIndex = index; isModalOpen = true; updateModalContent();
            const modal = document.getElementById('modal'); const frame = document.getElementById('modalFrame');
            modal.classList.add('active'); setTimeout(() => { frame.classList.remove('scale-95'); frame.classList.add('scale-100'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function updateModalContent() {
            const track = tracks[modalIndex];
            document.getElementById('fullTitle').innerText = track.title;
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${track.youtubeId}?autoplay=1`;
            const spBtn = document.getElementById('linkSpotify'); const scBtn = document.getElementById('linkSoundcloud');
            if(track.spotify) { spBtn.style.display = "flex"; spBtn.href = track.spotify; } else { spBtn.style.display = "none"; }
            if(track.sc) { scBtn.style.display = "flex"; scBtn.href = track.sc; } else { scBtn.style.display = "none"; }
            document.getElementById('linkYoutube').href = `https://youtube.com/watch?v=${track.youtubeId}`;
        }
        function nextTrack(e) { if (e) e.stopPropagation(); modalIndex = (modalIndex + 1) % tracks.length; updateModalContent(); }
        function prevTrack(e) { if (e) e.stopPropagation(); modalIndex = (modalIndex - 1 + tracks.length) % tracks.length; updateModalContent(); }
        function closeModal() {
            isModalOpen = false; const modal = document.getElementById('modal'); const frame = document.getElementById('modalFrame');
            frame.classList.remove('scale-100'); frame.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('active'); document.getElementById('youtubePlayer').src = ""; document.body.style.overflow = 'auto'; }, 300);
        }
    </script>
</body>
</html>
