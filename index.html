<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --snap-type: y mandatory;
        }

        html {
            scroll-snap-type: var(--snap-type);
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Ambient Glow Layer */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            width: 120vmin;
            height: 120vmin;
            object-fit: cover;
            filter: blur(100px) saturate(3) contrast(1.2); 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .ambient-glow.active {
            opacity: 0.45;
        }

        /* Central Image Layer */
        .fixed-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-wrapper {
            position: relative;
            width: 85vw;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) translateY(20px);
            filter: blur(15px);
        }

        .main-image.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
            z-index: 20;
        }

        /* Scroll Sections */
        .scroll-section {
            height: 100vh;
            scroll-snap-align: start;
        }

        /* RELEASES Page (Hidden Overlay) */
        #releases-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 1000;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 6rem 2rem;
            box-sizing: border-box;
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        .release-card {
            background: rgba(255,255,255,0.03);
            border-radius: 0.5rem;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .release-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
        }

        /* Social Section At Bottom of Home */
        .social-section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 100;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 75%);
        }

        .social-link {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            transition: all 0.4s ease;
            margin: 0.5rem 0;
            display: block;
        }

        .social-link:hover {
            color: #fff;
            letter-spacing: 0.4em;
            transform: scale(1.05);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.35rem;
            border-radius: 4rem;
            display: flex;
            gap: 0.2rem;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* Modal */
        #modal {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 3000;
        }

        #modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scroll-dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .scroll-dot.active {
            background: #fff;
            transform: scale(1.8);
        }

        .jump-btn-integrated {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="glow-container">
        <img id="glow1" src="" class="ambient-glow active">
        <img id="glow2" src="" class="ambient-glow">
    </div>

    <!-- Scroll Indicators -->
    <div id="side-nav" class="fixed right-8 top-1/2 -translate-y-1/2 z-[100] flex flex-col items-center gap-6 transition-opacity duration-500">
        <button onclick="jumpTo('top')" class="jump-btn-integrated">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        <div class="flex flex-col gap-4" id="scrollIndicator"></div>
        <button onclick="jumpTo('bottom')" class="jump-btn-integrated">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
    </div>

    <div id="imageLayer" class="fixed-image-layer">
        <div class="image-wrapper" onclick="openModal()">
            <img id="img1" src="" class="main-image active">
            <img id="img2" src="" class="main-image">
        </div>
    </div>

    <!-- Main Home Scroll Container -->
    <div id="home-content">
        <div id="scrollArea"></div>

        <!-- Social Section (Always at the end of the home flow) -->
        <div id="social-section" class="social-section">
            <div class="mb-12">
                <h2 class="text-4xl md:text-6xl font-thin uppercase tracking-[0.4em] mb-4">Connect</h2>
                <div class="h-[1px] w-12 bg-white/20 mx-auto"></div>
            </div>
            <div class="flex flex-col gap-4">
                <a href="https://gate.sc/?url=https%3A%2F%2Fopen.spotify.com%2Fartist%2F4uRpFQ2D51xyz2O4V9pqon%3Fsi%3DYChorytRR16_zt5os9q1OA&token=c861bb-1-1773742119572" target="_blank" class="social-link">Spotify</a>
                <a href="https://gate.sc/?url=https%3A%2F%2Fwww.youtube.com%2F%40Mozesofc&token=3b43e5-1-1773742119573" target="_blank" class="social-link">YouTube</a>
                <a href="https://soundcloud.com/mozesofc" target="_blank" class="social-link">SoundCloud</a>
                <a href="https://gate.sc/?url=https%3A%2F%2Fwww.instagram.com%2FMozesofc&token=63a593-1-1773742119572" target="_blank" class="social-link">Instagram</a>
                <a href="https://linktr.ee/mozesofc" target="_blank" class="social-link">Linktree</a>
                <div class="mt-8">
                    <p class="text-[9px] uppercase tracking-[0.5em] text-white/20 mb-2">For contact and promos</p>
                    <a href="mailto:Info@mozesmusic.com" class="text-white/60 hover:text-white transition-all tracking-[0.1em] font-light">Info@mozesmusic.com</a>
                </div>
            </div>
        </div>
    </div>

    <!-- RELEASES Page (Separate Modal-like Page) -->
    <div id="releases-page">
        <div class="max-w-6xl mx-auto px-4 pb-32">
            <header class="mb-16 text-center">
                <h2 class="text-3xl md:text-5xl font-light uppercase tracking-[0.3em] mb-4">Releases</h2>
                <div class="h-[1px] w-12 bg-white/20 mx-auto mb-4"></div>
            </header>
            <div class="releases-grid" id="releasesGrid"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" dir="ltr">
        <button onclick="navigate('home')" id="nav-home" class="nav-btn active">Mozes</button>
        <button onclick="navigate('releases')" id="nav-releases" class="nav-btn">Releases</button>
        <button onclick="navigate('social')" id="nav-social" class="nav-btn">Social</button>
    </nav>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="relative w-full max-w-2xl modal-content rounded-[1.5rem] p-8 md:p-12 flex flex-col gap-8">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-white/20 hover:text-white transition-all text-xl">&times;</button>
            <h3 id="fullTitle" class="text-lg md:text-xl font-light uppercase tracking-[0.05em] text-white/90 text-left" dir="ltr">TRACK TITLE</h3>
            <div class="aspect-video w-full rounded-xl overflow-hidden bg-black">
                <iframe id="youtubePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { src: "image1.jpg", title: "Mozes - BALAGAN", youtubeId: "yng3GffPK_U" },
            { src: "image2.jpg", title: "Cosmic Gate, Christian Burns - Brave (Mozes Remix)", youtubeId: "kO8ylPtWT14" },
            { src: "image3.jpg", title: "James Hype - Dont Wake Me Up (Mozes Remix)", youtubeId: "57W4t-hN3Vo" },
            { src: "image4.jpg", title: "Tayri - Black Sheep (Mozes Remix)", youtubeId: "DKCr5GG4PXA" },
            { src: "image5.jpg", title: "Mozes - What Took You So Long (Mozes Remix)", youtubeId: "gcReNaVNd4E" },
            { src: "image6.jpg", title: "Mozes & Mushy - Found Myself", youtubeId: "It-mN5HDWvA" },
            { src: "image7.jpg", title: "Mozes - Trust Me", youtubeId: "34tKhmQV2tc" },
            { src: "image8.jpg", title: "Mozes - Nights In White Satin", youtubeId: "t1rYx5CewP8" },
            { src: "image9.jpg", title: "Shaggy ft. Lavbbe - MOVE (Mozes Remix)", youtubeId: "yhUHCS-IRmQ" },
            { src: "image10.jpg", title: "Mozes - Home", youtubeId: "KwZS_LO0ijc" },
            { src: "image11.jpg", title: "Mozes - Two Souls", youtubeId: "_fe05MJLhy8" },
            { src: "image12.jpg", title: "Mozes - They Say", youtubeId: "AIVBYJC1Gtg" },
            { src: "image13.jpg", title: "Mozes ft. Sapir J. Fox - The Otherside", youtubeId: "y_LntJI2uqo" },
            { src: "image14.jpg", title: "Mozes - Save Our Future", youtubeId: "AhefaUTmnwo" },
            { src: "image15.jpg", title: "Mozes - Atlantis", youtubeId: "Tl4ZQ4KhtD4" },
            { src: "image16.jpg", title: "Mozes - Nowhere To Hide", youtubeId: "0_tl1Xrsnus" },
            { src: "image17.jpg", title: "Mozes ft. Sapir J. Fox - Reborn Again", youtubeId: "EJeLvlcBXas" },
            { src: "image18.jpg", title: "Mozes - Trust Me (DnB Remix)", youtubeId: "Lk1KZFLwV3Q" },
            { src: "image19.jpg", title: "Mozes & Jazz - Wealth, Power & Fame", youtubeId: "ecL3Out6ja8" },
            { src: "image20.jpg", title: "Mozes - Late at Night", youtubeId: "4U_tvQ4WSRo" }
        ];

        let currentIndex = 0;
        let activeLayer = 1;
        let isReleasesOpen = false;

        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const releasesGrid = document.getElementById('releasesGrid');
        const releasesPage = document.getElementById('releases-page');
        const scrollArea = document.getElementById('scrollArea');
        const sideNav = document.getElementById('side-nav');

        // Setup Home Sections + 1 (Social)
        const totalHomeSections = tracks.length + 1;

        for(let i=0; i < tracks.length; i++) {
            const sec = document.createElement('div');
            sec.className = 'scroll-section';
            scrollArea.appendChild(sec);
        }

        // Setup indicators
        for(let i=0; i < totalHomeSections; i++) {
            const dot = document.createElement('div');
            dot.className = `scroll-dot ${i === 0 ? 'active' : ''}`;
            dot.id = `dot-${i}`;
            dot.onclick = () => {
                if(isReleasesOpen) navigate('home');
                window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
            };
            scrollIndicator.appendChild(dot);
        }

        tracks.forEach((track, i) => {
            const card = document.createElement('div');
            card.className = 'release-card';
            card.onclick = () => { 
                // When clicking in Releases page, we temporarily update currentIndex to play right track
                currentIndex = i; 
                openModal(); 
            };
            card.innerHTML = `<div class="aspect-square bg-zinc-900"><img src="${track.src}" class="w-full h-full object-cover"></div>
                             <div class="p-4 text-[10px] tracking-[0.2em] uppercase text-white/90 truncate text-left" dir="ltr">${track.title}</div>`;
            releasesGrid.appendChild(card);
        });

        img1.src = tracks[0].src; glow1.src = tracks[0].src;
        img2.src = tracks[0].src; glow2.src = tracks[0].src;

        window.addEventListener('scroll', () => {
            if (isReleasesOpen) return;

            const scrollPos = window.scrollY;
            const idx = Math.min(totalHomeSections - 1, Math.floor((scrollPos + window.innerHeight/2) / window.innerHeight));
            
            // If we reach the social section at the bottom of Home
            if (idx === tracks.length) {
                document.getElementById('imageLayer').style.opacity = "0";
            } else if (idx < tracks.length) {
                document.getElementById('imageLayer').style.opacity = "1";
                if (idx !== currentIndex) {
                    currentIndex = idx;
                    updateUI(idx);
                }
            }
            
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
        });

        function updateUI(idx) {
            const [nextImg, currImg] = activeLayer === 1 ? [img2, img1] : [img1, img2];
            const [nextGlow, currGlow] = activeLayer === 1 ? [glow2, glow1] : [glow1, glow2];
            nextImg.src = tracks[idx].src; nextGlow.src = tracks[idx].src;
            nextImg.classList.add('active'); nextGlow.classList.add('active');
            currImg.classList.remove('active'); currGlow.classList.remove('active');
            activeLayer = activeLayer === 1 ? 2 : 1;
        }

        function navigate(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');

            if (page === 'home' || page === 'social') {
                // Return to Home view
                isReleasesOpen = false;
                releasesPage.style.opacity = "0";
                setTimeout(() => { releasesPage.style.display = "none"; }, 500);
                
                document.documentElement.style.setProperty('--snap-type', 'y mandatory');
                sideNav.style.opacity = "1";
                sideNav.style.pointerEvents = "auto";
                
                const target = page === 'home' ? 0 : tracks.length * window.innerHeight;
                window.scrollTo({ top: target, behavior: 'smooth' });
            } 
            else if (page === 'releases') {
                // Open Releases as a separate page
                isReleasesOpen = true;
                releasesPage.style.display = "block";
                setTimeout(() => { releasesPage.style.opacity = "1"; }, 10);
                
                document.documentElement.style.setProperty('--snap-type', 'none');
                document.getElementById('imageLayer').style.opacity = "0";
                sideNav.style.opacity = "0";
                sideNav.style.pointerEvents = "none";
            }
        }

        function jumpTo(pos) {
            if (isReleasesOpen) return;
            window.scrollTo({ top: pos === 'top' ? 0 : (tracks.length) * window.innerHeight, behavior: 'smooth' });
        }

        function openModal() {
            const track = tracks[currentIndex];
            document.getElementById('fullTitle').innerText = track.title;
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${track.youtubeId}?autoplay=1`;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('youtubePlayer').src = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
