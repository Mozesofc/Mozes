<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Ambient Neon Glow Layer */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 120vmin;
            height: 120vmin;
            object-fit: cover;
            filter: blur(100px) saturate(4) contrast(1.5); 
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            transform: scale(1.3);
        }

        .ambient-glow.active {
            opacity: 0.6;
        }

        /* Fixed background container for the main image */
        .fixed-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .image-wrapper {
            position: relative;
            width: 95vmin; 
            height: 95vmin;
            max-width: 900px;
            max-height: 900px;
            pointer-events: auto;
        }

        .main-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.98);
        }

        .main-image.active {
            opacity: 1;
            transform: scale(1);
            z-index: 20;
        }

        /* Scroll spacers */
        .scroll-trigger-area {
            position: relative;
            z-index: 5;
        }

        .scroll-section {
            height: 100vh;
        }

        /* Header / Logo Styling */
        .site-header {
            position: fixed;
            top: 3rem;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .logo-img {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
        }

        /* Modal enhancements */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* Social Icons - Colored by Brand */
        .social-icon {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }
        .social-icon:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        /* Brand Colors */
        .spotify { color: #1DB954; }
        .spotify:hover { filter: drop-shadow(0 0 8px rgba(29, 185, 84, 0.6)); }
        
        .apple { color: #FA243C; }
        .apple:hover { filter: drop-shadow(0 0 8px rgba(250, 36, 60, 0.6)); }
        
        .youtube { color: #FF0000; }
        .youtube:hover { filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.6)); }
        
        .soundcloud { color: #FF3300; }
        .soundcloud:hover { filter: drop-shadow(0 0 8px rgba(255, 51, 0, 0.6)); }

        /* Video Player Wrapper */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <!-- Changed to logo.png as requested -->
        <img src="logo.png" alt="MOZES Logo" class="logo-img">
    </header>

    <!-- Background Glow Layers -->
    <div class="glow-container" id="glowContainer">
        <img id="glow1" src="" class="ambient-glow active">
        <img id="glow2" src="" class="ambient-glow">
    </div>

    <!-- Main Image Layers -->
    <div class="fixed-image-layer">
        <div class="image-wrapper" onclick="openModal()">
            <img id="img1" src="" class="main-image active">
            <img id="img2" src="" class="main-image">
        </div>
    </div>

    <!-- Scroll Areas (3 tracks) -->
    <div class="scroll-trigger-area">
        <div class="scroll-section"></div>
        <div class="scroll-section"></div>
        <div class="scroll-section"></div>
        <div class="scroll-section"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        
        <div class="modal-content relative p-6 md:p-8 max-w-4xl w-full rounded-2xl overflow-hidden">
            <!-- Close Button -->
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white/40 hover:text-white transition-colors text-2xl z-20">&times;</button>
            
            <div class="flex flex-col gap-4">
                <!-- Unified Title Row (Aligned with Video Start) -->
                <div class="flex flex-row">
                    <div class="flex-grow text-left" dir="ltr">
                        <h2 id="fullTitle" class="text-xl md:text-2xl font-black tracking-tight text-white uppercase leading-tight">
                            TRACK NAME
                        </h2>
                    </div>
                    <div class="w-10 md:w-12"></div>
                </div>

                <!-- Main Layout: Video + Icons -->
                <div class="flex flex-row gap-6 items-center">
                    <!-- Video Player -->
                    <div class="flex-grow">
                        <div class="video-container border border-white/10">
                            <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>

                    <!-- Sidebar Social Icons (Colored) -->
                    <div class="flex flex-col gap-6 md:gap-8 px-1">
                        <a href="#" class="social-icon spotify" title="Spotify">
                            <svg class="w-6 h-6 md:w-7 md:h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.503 17.306c-.214.351-.674.462-1.025.248-2.859-1.747-6.458-2.143-10.697-1.176-.401.092-.803-.16-.895-.561-.092-.401.16-.803.561-.895 4.636-1.059 8.625-.6 11.808 1.346.351.214.462.674.248 1.038zm1.472-3.26c-.269.438-.845.578-1.283.309-3.272-2.011-8.258-2.592-12.127-1.417-.492.149-1.011-.131-1.16-.622-.149-.491.131-1.011.622-1.16 4.417-1.341 9.914-.689 13.639 1.601.438.269.578.845.309 1.289zm.126-3.4c-3.924-2.33-10.387-2.545-14.151-1.403-.601.182-1.234-.165-1.416-.766-.182-.6.165-1.234.766-1.416 4.314-1.31 11.451-1.054 15.965 1.625.54.32.716 1.016.396 1.556-.32.54-1.016.716-1.556.396z"/></svg>
                        </a>
                        <a href="#" class="social-icon apple" title="Apple Music">
                            <svg class="w-6 h-6 md:w-8 md:h-8" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm4.441 12.871l-4.522 2.61c-.551.319-1.252-.078-1.252-.715V9.458c0-.638.701-1.034 1.252-.715l4.522 2.61c.551.318.551 1.115 0 1.434z"/>
                            </svg>
                        </a>
                        <a href="#" class="social-icon youtube" title="YouTube">
                            <svg class="w-6 h-6 md:w-7 md:h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                        </a>
                        <a href="#" class="social-icon soundcloud" title="SoundCloud">
                            <svg class="w-8 h-8 md:w-9 md:h-9" fill="currentColor" viewBox="0 0 24 24"><path d="M7 16h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H7c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-6c0-.276.224-.5.5-.5H10c.276 0 .5.224.5.5v6c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-10c0-.276.224-.5.5-.5H13c.276 0 .5.224.5.5v10c0 .276-.224.5-.5.5zm3-1h-.5c-.276 0-.5-.224-.5-.5v-7c0-.276.224-.5.5-.5H16c.276 0 .5.224.5.5v7c0 .276-.224.5-.5.5zm3-2h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H19c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zM4 15h-.5c-.276 0-.5-.224-.5-.5v-2c0-.276.224-.5.5-.5H4c.276 0 .5.224.5.5v2c0 .276-.224.5-.5.5z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { 
                src: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=1000", 
                title: "Mozes - BALAGAN", 
                youtubeId: "yng3GffPK_U" 
            },
            { 
                src: "https://images.unsplash.com/photo-1571266028243-e4bb33394832?w=1000", 
                title: "Cosmic Gate, Christian Burns - Brave (Mozes Remix)", 
                youtubeId: "kO8ylPtWT14" 
            },
            { 
                src: "https://images.unsplash.com/photo-1514525253361-bee243870eb2?w=1000", 
                title: "James Hype - Dont Wake Me Up (Mozes Remix) MELODIC TECHNO", 
                youtubeId: "57W4t-hN3Vo" 
            }
        ];

        let currentIndex = 0;
        let activeLayer = 1;

        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const modal = document.getElementById('modal');
        const fullTitle = document.getElementById('fullTitle');
        const ytPlayer = document.getElementById('youtubePlayer');

        // Initial state setup
        img1.src = tracks[0].src;
        glow1.src = tracks[0].src;
        img2.src = tracks[0].src;
        glow2.src = tracks[0].src;

        window.addEventListener('scroll', () => {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPosition = window.scrollY;
            const scrollPercent = Math.max(0, Math.min(1, scrollPosition / scrollHeight));
            
            const index = Math.min(tracks.length - 1, Math.floor(scrollPercent * tracks.length));
            
            if (index !== currentIndex) {
                currentIndex = index;
                updateImages(currentIndex);
            }
        });

        function updateImages(idx) {
            const nextImg = activeLayer === 1 ? img2 : img1;
            const currentImg = activeLayer === 1 ? img1 : img2;
            const nextGlow = activeLayer === 1 ? glow2 : glow1;
            const currentGlow = activeLayer === 1 ? glow1 : glow2;
            
            nextImg.src = tracks[idx].src;
            nextGlow.src = tracks[idx].src;
            
            nextImg.classList.add('active');
            nextGlow.classList.add('active');
            currentImg.classList.remove('active');
            currentGlow.classList.remove('active');
            
            activeLayer = activeLayer === 1 ? 2 : 1;
        }

        function openModal() {
            fullTitle.innerText = tracks[currentIndex].title;
            ytPlayer.src = `https://www.youtube.com/embed/${tracks[currentIndex].youtubeId}?autoplay=1&modestbranding=1&rel=0`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            ytPlayer.src = ""; 
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
