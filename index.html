<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-snap-type: y mandatory;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* הוספת הגדרה למניעת קפיצות גלילה */
            height: 100%;
        }

        /* Ambient Glow Layer */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            width: 120vmin;
            height: 120vmin;
            object-fit: cover;
            filter: blur(100px) saturate(3) contrast(1.2); 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .ambient-glow.active {
            opacity: 0.45;
        }

        /* Central Image Layer */
        .fixed-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-wrapper {
            position: relative;
            width: 85vw;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) translateY(20px);
            filter: blur(15px);
        }

        .main-image.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
            z-index: 20;
        }

        /* Scroll Sections */
        .scroll-section {
            height: 100vh;
            scroll-snap-align: start;
        }

        /* Modal */
        #modal {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }

        #modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: scale(0.97) translateY(10px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
        }

        #modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        /* RELEASES Page - Fix: explicit scrolling focus */
        #releases-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 140;
            padding: 6rem 2rem 8rem 2rem;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            box-sizing: border-box;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* שיפור גלילה במובייל */
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .release-card {
            background: rgba(255,255,255,0.02);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .release-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(15, 15, 15, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.35rem;
            border-radius: 4rem;
            display: flex;
            gap: 0.2rem;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .scroll-dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .scroll-dot.active {
            background: #fff;
            transform: scale(1.8);
        }

        /* Modal Nav Arrows */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            z-index: 10;
        }

        .modal-nav:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-50%) scale(1.1);
        }

        .modal-prev { left: -70px; }
        .modal-next { right: -70px; }

        /* Jump Buttons Integrated into Dot UI */
        .jump-btn-integrated {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .jump-btn-integrated:hover {
            color: #fff;
            transform: scale(1.2);
        }

        @media (max-width: 900px) {
            .modal-prev { left: 10px; background: rgba(0,0,0,0.4); }
            .modal-next { right: 10px; background: rgba(0,0,0,0.4); }
        }
    </style>
</head>
<body>

    <div class="glow-container">
        <img id="glow1" src="" class="ambient-glow active">
        <img id="glow2" src="" class="ambient-glow">
    </div>

    <!-- Scroll & Navigation Indicator (Right side) -->
    <div class="fixed right-8 top-1/2 -translate-y-1/2 z-[100] flex flex-col items-center gap-6" id="indicatorContainer">
        <button onclick="jumpTo('top')" class="jump-btn-integrated" title="Jump to Top">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        
        <div class="flex flex-col gap-4" id="scrollIndicator"></div>

        <button onclick="jumpTo('bottom')" class="jump-btn-integrated" title="Jump to Bottom">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
    </div>

    <div id="imageLayer" class="fixed-image-layer">
        <div class="image-wrapper" onclick="openModal()">
            <img id="img1" src="" class="main-image active">
            <img id="img2" src="" class="main-image">
        </div>
    </div>

    <!-- Home Scroll Area -->
    <div id="scrollArea"></div>

    <!-- RELEASES Page -->
    <div id="releases-page" onscroll="syncReleasesScroll()">
        <div class="max-w-6xl mx-auto px-4 pb-20"> <!-- Added padding bottom for safety -->
            <header class="mb-16 text-center">
                <h2 class="text-3xl md:text-5xl font-light uppercase tracking-[0.3em] mb-4">Releases</h2>
                <div class="h-[1px] w-12 bg-white/20 mx-auto mb-4"></div>
                <p class="text-white/30 font-light tracking-[0.5em] text-[10px] uppercase">Discography</p>
            </header>
            <div class="releases-grid" id="releasesGrid"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" dir="ltr">
        <button onclick="navigate('home')" id="nav-home" class="nav-btn active">Mozes</button>
        <button onclick="navigate('releases')" id="nav-releases" class="nav-btn">Releases</button>
        <a href="mailto:mozes@mozesmusic.com" class="nav-btn">Contact</a>
    </nav>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onclick="closeModal()"></div>
        
        <div class="relative w-full max-w-2xl">
            <div class="modal-nav modal-prev" onclick="changeTrack(-1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="modal-nav modal-next" onclick="changeTrack(1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>

            <div class="modal-content relative w-full rounded-[1.5rem] p-8 md:p-12 flex flex-col gap-8">
                <button onclick="closeModal()" class="absolute top-6 right-8 text-white/20 hover:text-white transition-all text-xl font-light">&times;</button>
                
                <div class="text-left" dir="ltr">
                    <h3 id="fullTitle" class="text-lg md:text-xl font-light uppercase tracking-[0.05em] text-white/90">TRACK TITLE</h3>
                    <div class="h-[1px] w-8 bg-white/10 mt-4"></div>
                </div>

                <div class="video-wrapper">
                    <iframe id="youtubePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>

                <div class="flex justify-center gap-12 items-center opacity-40 hover:opacity-100 transition-opacity duration-700">
                    <a id="spotifyLink" href="#" target="_blank" class="hover:scale-110 transition-transform">

                    </a>
                    <a id="youtubeIconLink" href="#" target="_blank" class="hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    </a>
                    <a id="soundcloudLink" href="#" target="_blank" class="hover:scale-110 transition-transform">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M7 16h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H7c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-6c0-.276.224-.5.5-.5H10c.276 0 .5.224.5.5v6c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-10c0-.276.224-.5.5-.5H13c.276 0 .5.224.5.5v10c0 .276-.224.5-.5.5zm3-1h-.5c-.276 0-.5-.224-.5-.5v-7c0-.276.224-.5.5-.5H16c.276 0 .5.224.5.5v7c0 .276-.224.5-.5.5zm3-2h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H19c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zM4 15h-.5c-.276 0-.5-.224-.5-.5v-2c0-.276.224-.5.5-.5H4c.276 0 .5.224.5.5v2c0 .276-.224.5-.5.5z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { src: "image1.jpg", title: "Mozes - BALAGAN", youtubeId: "yng3GffPK_U", spotify: "https://open.spotify.com/track/7smNpdIQgFXMevlfRpALPl?si=9b0031b3d1264de5", soundcloud: "https://soundcloud.com/mozesofc/mozes-balagan-xtd/s-bcdLxijoMqc" },
            { src: "image2.jpg", title: "Cosmic Gate, Christian Burns - Brave (Mozes Remix)", youtubeId: "kO8ylPtWT14", spotify: "https://open.spotify.com/track/4L0swo2Q5bgMFt7QLW2VLJ?si=2a65641dd59345b8", soundcloud: "https://soundcloud.com/cosmicgateofficial/brave-mozes-remix" },
            { src: "image3.jpg", title: "James Hype - Dont Wake Me Up (Mozes Remix)", youtubeId: "57W4t-hN3Vo", spotify: "", soundcloud: "https://soundcloud.com/mozesofc/james-hype-dont-wake-me-up-mozes-remix" },
            { src: "image4.jpg", title: "Tayri - Black Sheep (Mozes Remix)", youtubeId: "DKCr5GG4PXA", spotify: "https://open.spotify.com/track/4W9jAYLHL9WY0VSJReAWyz?si=e6cc592efde24263", soundcloud: "https://soundcloud.com/tayrimusic/black-sheep-mozes-remix" },
            { src: "image5.jpg", title: "Mozes - What Took You So Long (Mozes Remix)", youtubeId: "gcReNaVNd4E", spotify: "https://open.spotify.com/track/11GmTco3PeaDi8YL4e1bW9?si=9d1b0bb5358d45ac", soundcloud: "https://soundcloud.com/mozesofc/wtyslmozesrmx" },
            { src: "image6.jpg", title: "Mozes & Mushy - Found Myself", youtubeId: "Lk1KZFLwV3Q", spotify: "https://open.spotify.com/track/2MBh2ud1J7vKwR4uJwwAJU?si=340c87450a8c4c3a", soundcloud: "https://soundcloud.com/mozesofc/mozesxmushy-found-myself" },
            { src: "image7.jpg", title: "Mozes - Trust Me", youtubeId: "34tKhmQV2tc", spotify: "https://open.spotify.com/track/5lEI5Ywvd7zUC9x6JATxkU?si=9e49dc74ef094e53", soundcloud: "https://soundcloud.com/mozesofc/mozes-trust-me-r" },
            { src: "image8.jpg", title: "Mozes - Nights In White Satin", youtubeId: "t1rYx5CewP8", spotify: "https://open.spotify.com/track/0nu2UYXq3rhxa1fNFRcfPu?si=1f53656a94124448", soundcloud: "https://soundcloud.com/mozesofc/mozes-nights-in-white-satin" },
            { src: "image9.jpg", title: "Shaggy ft. Lavbbe - MOVE (Mozes Remix)", youtubeId: "yhUHCS-IRmQ", spotify: "https://open.spotify.com/track/0xw5UUG2sOJxp8LaM08MAH?si=be5c8011bd364fea", soundcloud: "" },
            { src: "image10.jpg", title: "Mozes - Home", youtubeId: "KwZS_LO0ijc", spotify: "https://open.spotify.com/track/5gRfW2abrCOZQpG9PbWikH?si=619603f0165c421a", soundcloud: "https://soundcloud.com/mozesofc/mozes-home-radio-edit" },
            { src: "image11.jpg", title: "Mozes - Two Souls", youtubeId: "_fe05MJLhy8", spotify: "https://open.spotify.com/track/0xVrvo5uHs6I210jsv3vfy?si=9196baa8ac5c48b5", soundcloud: "https://soundcloud.com/mozesofc/mozes-2-souls" },
            { src: "image12.jpg", title: "Mozes - They Say", youtubeId: "AIVBYJC1Gtg", spotify: "https://open.spotify.com/track/452MRziT5Dq7opF9qGCf5U?si=8466ebe7493e4550", soundcloud: "https://soundcloud.com/mozesofc/mozes-they-say-r" },
            { src: "image13.jpg", title: "Mozes ft. Sapir J. Fox - The Otherside", youtubeId: "y_LntJI2uqo", spotify: "https://open.spotify.com/track/4leube2v9p8EuVb52Dd3YG?si=c193f92a2d7a42c6", soundcloud: "https://soundcloud.com/mozesofc/mozes-sapir-the-otherside" },
            { src: "image14.jpg", title: "Mozes - Save Our Future", youtubeId: "AhefaUTmnwo", spotify: "https://open.spotify.com/track/5ea19cn1sh6lOCXMun7fzl?si=2d588f08d5cc415f", soundcloud: "https://soundcloud.com/mozesofc/mozes-save-our-future-r" },
            { src: "image15.jpg", title: "Mozes - Atlantis", youtubeId: "Tl4ZQ4KhtD4", spotify: "https://open.spotify.com/track/6z9GxXxcAvtcso9z0Q5ENz?si=5ccd25477dea4c1c", soundcloud: "https://soundcloud.com/mozesofc/mozes-atlantis" },
            { src: "image16.jpg", title: "Mozes - Nowhere To Hide", youtubeId: "0_tl1Xrsnus", spotify: "https://open.spotify.com/track/3K8fQDov2?si=85b1af1dd9834eb0", soundcloud: "https://soundcloud.com/mozesofc/mozes-nowhere-to-hide-r" },
            { src: "image17.jpg", title: "Mozes ft. Sapir J. Fox - Reborn Again", youtubeId: "EJeLvlcBXas", spotify: "https://open.spotify.com/track/3lbh8xwPegIaUzctkT2GNd?si=7cde9b64fd6d4eb7", soundcloud: "https://soundcloud.com/mozesofc/mozes-sapir-reborn-again" },
            { src: "image18.jpg", title: "Mozes - Trust Me (DnB Remix)", youtubeId: "Lk1KZFLwV3Q", spotify: "https://open.spotify.com/track/1d8Z4FpBiPmLzF15mTrUbA?si=f963e61c2ff840e5", soundcloud: "https://soundcloud.com/mozesofc/mozes-trust-me-the-dnb-4" },
            { src: "image19.jpg", title: "Mozes & Jazz - Wealth, Power & Fame", youtubeId: "ecL3Out6ja8", spotify: "https://open.spotify.com/track/5axqxREDfJF5vRibAghSWP?si=f5b9252112f24dd2", soundcloud: "https://soundcloud.com/mozesofc/mozes-jazz-wealth-power-and-fame" },
            { src: "image20.jpg", title: "Mozes - Late at Night", youtubeId: "4U_tvQ4WSRo", spotify: "https://open.spotify.com/track/7bUSduMOSEcBORTvDZcq5J?si=abebea2b300f44ca", soundcloud: "https://soundcloud.com/mozesofc/mozes-late-at-night-radio-edit" }
        ];

        let currentIndex = 0;
        let activeLayer = 1;
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const releasesGrid = document.getElementById('releasesGrid');
        const releasesPage = document.getElementById('releases-page');
        const modal = document.getElementById('modal');

        // Init Scroll Indicators (Dots)
        tracks.forEach((_, i) => {
            const sec = document.createElement('div');
            sec.className = 'scroll-section';
            document.getElementById('scrollArea').appendChild(sec);
            
            const dot = document.createElement('div');
            dot.className = `scroll-dot ${i === 0 ? 'active' : ''}`;
            dot.id = `dot-${i}`;
            dot.onclick = () => {
                if(releasesPage.style.display === 'block') {
                    const containerHeight = releasesPage.scrollHeight - releasesPage.clientHeight;
                    const scrollPos = (i / (tracks.length - 1)) * containerHeight;
                    releasesPage.scrollTo({ top: scrollPos, behavior: 'smooth' });
                } else {
                    window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
                }
            };
            scrollIndicator.appendChild(dot);
        });

        // Init Releases Grid
        tracks.forEach((track, i) => {
            const card = document.createElement('div');
            card.className = 'release-card group cursor-pointer';
            card.onclick = () => { currentIndex = i; openModal(); };
            card.innerHTML = `
                <div class="aspect-square overflow-hidden">
                    <img src="${track.src}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700 scale-100 group-hover:scale-105">
                </div>
                <div class="p-4 bg-white/[0.02]">
                    <p class="text-[11px] font-light uppercase tracking-wider text-white/80 truncate text-left" dir="ltr">${track.title}</p>
                </div>
            `;
            releasesGrid.appendChild(card);
        });

        img1.src = tracks[0].src; glow1.src = tracks[0].src;
        img2.src = tracks[0].src; glow2.src = tracks[0].src;

        // Window Scroll Listener (Home Page)
        window.addEventListener('scroll', () => {
            if(releasesPage.style.display === 'block') return;
            const idx = Math.min(tracks.length - 1, Math.round(window.scrollY / window.innerHeight));
            if (idx !== currentIndex) {
                currentIndex = idx;
                updateUI(idx);
            }
        });

        // Releases Scroll Listener (Internal Container)
        function syncReleasesScroll() {
            if(releasesPage.style.display !== 'block') return;
            const containerHeight = releasesPage.scrollHeight - releasesPage.clientHeight;
            if (containerHeight <= 0) return;
            
            const scrollPos = releasesPage.scrollTop;
            const progress = scrollPos / containerHeight;
            const idx = Math.min(tracks.length - 1, Math.round(progress * (tracks.length - 1)));
            
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
        }

        function updateUI(idx) {
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
            
            const [nextImg, currImg] = activeLayer === 1 ? [img2, img1] : [img1, img2];
            const [nextGlow, currGlow] = activeLayer === 1 ? [glow2, glow1] : [glow1, glow2];
            
            nextImg.src = tracks[idx].src; nextGlow.src = tracks[idx].src;
            nextImg.classList.add('active'); nextGlow.classList.add('active');
            currImg.classList.remove('active'); currGlow.classList.remove('active');
            
            activeLayer = activeLayer === 1 ? 2 : 1;
        }

        function navigate(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
            
            if (page === 'home') {
                releasesPage.style.opacity = "0";
                setTimeout(() => {
                    releasesPage.style.display = "none";
                    document.getElementById('imageLayer').style.opacity = "1";
                    document.documentElement.style.scrollSnapType = "y mandatory";
                    document.body.style.overflow = "auto";
                    window.scrollTo(0, currentIndex * window.innerHeight);
                    updateUI(currentIndex);
                }, 400);
            } else {
                document.getElementById('imageLayer').style.opacity = "0";
                setTimeout(() => {
                    releasesPage.style.display = "block";
                    // הכרחי: נותן לקונטיינר פוקוס כדי שהגלילה תעבוד מיד
                    releasesPage.focus();
                    setTimeout(() => releasesPage.style.opacity = "1", 50);
                    document.documentElement.style.scrollSnapType = "none";
                    // נועל את ה-body כדי שרק הדיב הפנימי יגלוש
                    document.body.style.overflow = "hidden";
                    releasesPage.scrollTo(0, 0);
                    syncReleasesScroll();
                }, 400);
            }
        }

        function jumpTo(position) {
            const isReleases = releasesPage.style.display === 'block';
            const target = isReleases ? releasesPage : window;
            const scrollValue = position === 'top' ? 0 : (isReleases ? releasesPage.scrollHeight : document.body.scrollHeight);
            
            target.scrollTo({
                top: scrollValue,
                behavior: 'smooth'
            });
        }

        function openModal() {
            updateModalData();
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            if (releasesPage.style.display === 'block') releasesPage.style.overflow = 'hidden';
        }

        function updateModalData() {
            const track = tracks[currentIndex];
            document.getElementById('fullTitle').innerText = track.title;
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${track.youtubeId}?autoplay=1&modestbranding=1&rel=0`;
            document.getElementById('youtubeIconLink').href = `https://www.youtube.com/watch?v=${track.youtubeId}`;
            
            const s = document.getElementById('spotifyLink');
            s.style.display = track.spotify ? 'block' : 'none'; s.href = track.spotify;
            
            const sc = document.getElementById('soundcloudLink');
            sc.style.display = track.soundcloud ? 'block' : 'none'; sc.href = track.soundcloud;
            
            if (releasesPage.style.display !== "block") {
                updateUI(currentIndex);
            }
        }

        function changeTrack(direction) {
            currentIndex = (currentIndex + direction + tracks.length) % tracks.length;
            updateModalData();
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('youtubePlayer').src = "";
            if (releasesPage.style.display !== "block") {
                document.body.style.overflow = 'auto';
            } else {
                releasesPage.style.overflow = 'auto';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('active')) {
                if (e.key === 'ArrowRight') changeTrack(1);
                if (e.key === 'ArrowLeft') changeTrack(-1);
                if (e.key === 'Escape') closeModal();
            }
        });
    </script>
</body>
</html>
