<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-snap-type: y mandatory;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            height: 100%;
        }

        /* Ambient Glow Layer */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            width: 120vmin;
            height: 120vmin;
            object-fit: cover;
            filter: blur(100px) saturate(3) contrast(1.2); 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .ambient-glow.active {
            opacity: 0.45;
        }

        /* Central Image Layer */
        .fixed-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-wrapper {
            position: relative;
            width: 85vw;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) translateY(20px);
            filter: blur(15px);
        }

        .main-image.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
            z-index: 20;
        }

        /* Scroll Sections */
        .scroll-section {
            height: 100vh;
            scroll-snap-align: start;
        }

        /* RELEASES Page - Fix: Improved Scroll & Brightness */
        #releases-page {
            position: absolute; /* שינוי מ-fixed כדי לאפשר גלילה טבעית של ה-body */
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            background: #000;
            z-index: 140;
            padding: 8rem 2rem 10rem 2rem;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            box-sizing: border-box;
        }

        /* Ambient background for releases page to keep it from being too dark */
        .releases-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
        }

        .release-card {
            background: rgba(255,255,255,0.03);
            border-radius: 0.5rem;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.05);
            /* מבטיח שהכרטיסייה לא תחסום גלילה */
            pointer-events: auto;
        }

        .release-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .release-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* הגברת בהירות התמונות */
            filter: brightness(0.9);
            transition: all 0.6s ease;
        }

        .release-card:hover img {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* Modal */
        #modal {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }

        #modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: scale(0.97) translateY(10px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
        }

        #modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.35rem;
            border-radius: 4rem;
            display: flex;
            gap: 0.2rem;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .scroll-dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .scroll-dot.active {
            background: #fff;
            transform: scale(1.8);
        }

        .jump-btn-integrated {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .jump-btn-integrated:hover {
            color: #fff;
        }

        /* Modal Nav Arrows */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            z-index: 10;
        }

        .modal-nav:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-50%) scale(1.1); }
        .modal-prev { left: -70px; }
        .modal-next { right: -70px; }

        @media (max-width: 900px) {
            .modal-prev { left: 10px; background: rgba(0,0,0,0.4); }
            .modal-next { right: 10px; background: rgba(0,0,0,0.4); }
        }
    </style>
</head>
<body>

    <div class="glow-container">
        <img id="glow1" src="" class="ambient-glow active">
        <img id="glow2" src="" class="ambient-glow">
    </div>

    <!-- Scroll & Navigation Indicator -->
    <div class="fixed right-8 top-1/2 -translate-y-1/2 z-[100] flex flex-col items-center gap-6" id="indicatorContainer">
        <button onclick="jumpTo('top')" class="jump-btn-integrated">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        <div class="flex flex-col gap-4" id="scrollIndicator"></div>
        <button onclick="jumpTo('bottom')" class="jump-btn-integrated">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
    </div>

    <div id="imageLayer" class="fixed-image-layer">
        <div class="image-wrapper" onclick="openModal()">
            <img id="img1" src="" class="main-image active">
            <img id="img2" src="" class="main-image">
        </div>
    </div>

    <!-- Home Scroll Area -->
    <div id="scrollArea"></div>

    <!-- RELEASES Page -->
    <div id="releases-page">
        <div class="releases-glow"></div>
        <div class="max-w-6xl mx-auto px-4 pb-32">
            <header class="mb-16 text-center">
                <h2 class="text-3xl md:text-5xl font-light uppercase tracking-[0.3em] mb-4">Releases</h2>
                <div class="h-[1px] w-12 bg-white/20 mx-auto mb-4"></div>
                <p class="text-white/30 font-light tracking-[0.5em] text-[10px] uppercase">Discography</p>
            </header>
            <div class="releases-grid" id="releasesGrid"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" dir="ltr">
        <button onclick="navigate('home')" id="nav-home" class="nav-btn active">Mozes</button>
        <button onclick="navigate('releases')" id="nav-releases" class="nav-btn">Releases</button>
        <a href="mailto:mozes@mozesmusic.com" class="nav-btn">Contact</a>
    </nav>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="relative w-full max-w-2xl">
            <div class="modal-nav modal-prev" onclick="changeTrack(-1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="modal-nav modal-next" onclick="changeTrack(1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
            <div class="modal-content relative w-full rounded-[1.5rem] p-8 md:p-12 flex flex-col gap-8">
                <button onclick="closeModal()" class="absolute top-6 right-8 text-white/20 hover:text-white transition-all text-xl">&times;</button>
                <div class="text-left" dir="ltr">
                    <h3 id="fullTitle" class="text-lg md:text-xl font-light uppercase tracking-[0.05em] text-white/90">TRACK TITLE</h3>
                </div>
                <div class="video-wrapper">
                    <iframe id="youtubePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="flex justify-center gap-12 items-center opacity-40 hover:opacity-100 transition-opacity duration-700">
                    <a id="spotifyLink" href="#" target="_blank"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.503 17.306c-.214.351-.674.462-1.025.248-2.859-1.747-6.458-2.143-10.697-1.176-.401.092-.803-.16-.895-.561-.092-.401.16-.803.561-.895 4.636-1.059 8.625-.6 11.808 1.346.351.214.462.674.248 1.038zm1.472-3.26c-.269.438-.845.578-1.283.309-3.272-2.011-8.258-2.592-12.127-1.417-.492.149-1.011-.131-1.16-.622-.149-.491.131-1.011.622-1.16 4.417-1.341 9.914-.689 13.639 1.601.438.269.578.845.309 1.289zm.126-3.4c-3.924-2.33-10.387-2.545-14.151-1.403-.601.182-1.234-.165-1.416-.766-.182-.6.165-1.234.766-1.416 4.314-1.31 11.451-1.054 15.965 1.625.54.32.716 1.016.396 1.556-.32.54-1.016.716-1.556.396z"/></svg></a>
                    <a id="youtubeIconLink" href="#" target="_blank"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
                    <a id="soundcloudLink" href="#" target="_blank"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M7 16h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H7c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-6c0-.276.224-.5.5-.5H10c.276 0 .5.224.5.5v6c0 .276-.224.5-.5.5zm3 1h-.5c-.276 0-.5-.224-.5-.5v-10c0-.276.224-.5.5-.5H13c.276 0 .5.224.5.5v10c0 .276-.224.5-.5.5zm3-1h-.5c-.276 0-.5-.224-.5-.5v-7c0-.276.224-.5.5-.5H16c.276 0 .5.224.5.5v7c0 .276-.224.5-.5.5zm3-2h-.5c-.276 0-.5-.224-.5-.5v-4c0-.276.224-.5.5-.5H19c.276 0 .5.224.5.5v4c0 .276-.224.5-.5.5zM4 15h-.5c-.276 0-.5-.224-.5-.5v-2c0-.276.224-.5.5-.5H4c.276 0 .5.224.5.5v2c0 .276-.224.5-.5.5z"/></svg></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { src: "image1.jpg", title: "Mozes - BALAGAN", youtubeId: "yng3GffPK_U", spotify: "https://open.spotify.com/track/7smNpdIQgFXMevlfRpALPl", soundcloud: "https://soundcloud.com/mozesofc/mozes-balagan-xtd" },
            { src: "image2.jpg", title: "Cosmic Gate, Christian Burns - Brave (Mozes Remix)", youtubeId: "kO8ylPtWT14", spotify: "https://open.spotify.com/track/4L0swo2Q5bgMFt7QLW2VLJ", soundcloud: "https://soundcloud.com/cosmicgateofficial/brave-mozes-remix" },
            { src: "image3.jpg", title: "James Hype - Dont Wake Me Up (Mozes Remix)", youtubeId: "57W4t-hN3Vo", spotify: "", soundcloud: "https://soundcloud.com/mozesofc/james-hype-dont-wake-me-up-mozes-remix" },
            { src: "image4.jpg", title: "Tayri - Black Sheep (Mozes Remix)", youtubeId: "DKCr5GG4PXA", spotify: "https://open.spotify.com/track/4W9jAYLHL9WY0VSJReAWyz", soundcloud: "https://soundcloud.com/tayrimusic/black-sheep-mozes-remix" },
            { src: "image5.jpg", title: "Mozes - What Took You So Long (Mozes Remix)", youtubeId: "gcReNaVNd4E", spotify: "https://open.spotify.com/track/11GmTco3PeaDi8YL4e1bW9", soundcloud: "https://soundcloud.com/mozesofc/wtyslmozesrmx" },
            { src: "image6.jpg", title: "Mozes & Mushy - Found Myself", youtubeId: "Lk1KZFLwV3Q", spotify: "https://open.spotify.com/track/2MBh2ud1J7vKwR4uJwwAJU", soundcloud: "https://soundcloud.com/mozesofc/mozesxmushy-found-myself" },
            { src: "image7.jpg", title: "Mozes - Trust Me", youtubeId: "34tKhmQV2tc", spotify: "https://open.spotify.com/track/5lEI5Ywvd7zUC9x6JATxkU", soundcloud: "https://soundcloud.com/mozesofc/mozes-trust-me-r" },
            { src: "image8.jpg", title: "Mozes - Nights In White Satin", youtubeId: "t1rYx5CewP8", spotify: "https://open.spotify.com/track/0nu2UYXq3rhxa1fNFRcfPu", soundcloud: "https://soundcloud.com/mozesofc/mozes-nights-in-white-satin" },
            { src: "image9.jpg", title: "Shaggy ft. Lavbbe - MOVE (Mozes Remix)", youtubeId: "yhUHCS-IRmQ", spotify: "https://open.spotify.com/track/0xw5UUG2sOJxp8LaM08MAH", soundcloud: "" },
            { src: "image10.jpg", title: "Mozes - Home", youtubeId: "KwZS_LO0ijc", spotify: "https://open.spotify.com/track/5gRfW2abrCOZQpG9PbWikH", soundcloud: "https://soundcloud.com/mozesofc/mozes-home-radio-edit" },
            { src: "image11.jpg", title: "Mozes - Two Souls", youtubeId: "_fe05MJLhy8", spotify: "https://open.spotify.com/track/0xVrvo5uHs6I210jsv3vfy", soundcloud: "https://soundcloud.com/mozesofc/mozes-2-souls" },
            { src: "image12.jpg", title: "Mozes - They Say", youtubeId: "AIVBYJC1Gtg", spotify: "https://open.spotify.com/track/452MRziT5Dq7opF9qGCf5U", soundcloud: "https://soundcloud.com/mozesofc/mozes-they-say-r" },
            { src: "image13.jpg", title: "Mozes ft. Sapir J. Fox - The Otherside", youtubeId: "y_LntJI2uqo", spotify: "https://open.spotify.com/track/4leube2v9p8EuVb52Dd3YG", soundcloud: "https://soundcloud.com/mozesofc/mozes-sapir-the-otherside" },
            { src: "image14.jpg", title: "Mozes - Save Our Future", youtubeId: "AhefaUTmnwo", spotify: "https://open.spotify.com/track/5ea19cn1sh6lOCXMun7fzl", soundcloud: "https://soundcloud.com/mozesofc/mozes-save-our-future-r" },
            { src: "image15.jpg", title: "Mozes - Atlantis", youtubeId: "Tl4ZQ4KhtD4", spotify: "https://open.spotify.com/track/6z9GxXxcAvtcso9z0Q5ENz", soundcloud: "https://soundcloud.com/mozesofc/mozes-atlantis" },
            { src: "image16.jpg", title: "Mozes - Nowhere To Hide", youtubeId: "0_tl1Xrsnus", spotify: "https://open.spotify.com/track/3K8fQDov2", soundcloud: "https://soundcloud.com/mozesofc/mozes-nowhere-to-hide-r" },
            { src: "image17.jpg", title: "Mozes ft. Sapir J. Fox - Reborn Again", youtubeId: "EJeLvlcBXas", spotify: "https://open.spotify.com/track/3lbh8xwPegIaUzctkT2GNd", soundcloud: "https://soundcloud.com/mozesofc/mozes-sapir-reborn-again" },
            { src: "image18.jpg", title: "Mozes - Trust Me (DnB Remix)", youtubeId: "Lk1KZFLwV3Q", spotify: "https://open.spotify.com/track/1d8Z4FpBiPmLzF15mTrUbA", soundcloud: "https://soundcloud.com/mozesofc/mozes-trust-me-the-dnb-4" },
            { src: "image19.jpg", title: "Mozes & Jazz - Wealth, Power & Fame", youtubeId: "ecL3Out6ja8", spotify: "https://open.spotify.com/track/5axqxREDfJF5vRibAghSWP", soundcloud: "https://soundcloud.com/mozesofc/mozes-jazz-wealth-power-and-fame" },
            { src: "image20.jpg", title: "Mozes - Late at Night", youtubeId: "4U_tvQ4WSRo", spotify: "https://open.spotify.com/track/7bUSduMOSEcBORTvDZcq5J", soundcloud: "https://soundcloud.com/mozesofc/mozes-late-at-night-radio-edit" }
        ];

        let currentIndex = 0;
        let activeLayer = 1;
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const releasesGrid = document.getElementById('releasesGrid');
        const releasesPage = document.getElementById('releases-page');
        const modal = document.getElementById('modal');

        // Setup dots and scroll sections
        tracks.forEach((_, i) => {
            const sec = document.createElement('div');
            sec.className = 'scroll-section';
            document.getElementById('scrollArea').appendChild(sec);
            
            const dot = document.createElement('div');
            dot.className = `scroll-dot ${i === 0 ? 'active' : ''}`;
            dot.id = `dot-${i}`;
            dot.onclick = () => {
                if(releasesPage.style.display === 'block') {
                    const scrollPos = (i / (tracks.length - 1)) * (document.documentElement.scrollHeight - window.innerHeight);
                    window.scrollTo({ top: scrollPos, behavior: 'smooth' });
                } else {
                    window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
                }
            };
            scrollIndicator.appendChild(dot);
        });

        // Setup grid cards
        tracks.forEach((track, i) => {
            const card = document.createElement('div');
            card.className = 'release-card';
            card.onclick = () => { currentIndex = i; openModal(); };
            card.innerHTML = `
                <div class="aspect-square overflow-hidden bg-zinc-900">
                    <img src="${track.src}" loading="lazy">
                </div>
                <div class="p-4">
                    <p class="text-[10px] font-medium uppercase tracking-[0.2em] text-white/90 truncate text-left" dir="ltr">${track.title}</p>
                </div>
            `;
            releasesGrid.appendChild(card);
        });

        img1.src = tracks[0].src; glow1.src = tracks[0].src;
        img2.src = tracks[0].src; glow2.src = tracks[0].src;

        window.addEventListener('scroll', () => {
            const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = window.scrollY / totalHeight;
            const idx = Math.min(tracks.length - 1, Math.round(progress * (tracks.length - 1)));
            
            if (idx !== currentIndex) {
                currentIndex = idx;
                updateUI(idx);
            }
        });

        function updateUI(idx) {
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
            
            // רק בדף הבית נעדכן את התמונות הגדולות
            if (releasesPage.style.display !== 'block') {
                const [nextImg, currImg] = activeLayer === 1 ? [img2, img1] : [img1, img2];
                const [nextGlow, currGlow] = activeLayer === 1 ? [glow2, glow1] : [glow1, glow2];
                
                nextImg.src = tracks[idx].src; nextGlow.src = tracks[idx].src;
                nextImg.classList.add('active'); nextGlow.classList.add('active');
                currImg.classList.remove('active'); currGlow.classList.remove('active');
                activeLayer = activeLayer === 1 ? 2 : 1;
            }
        }

        function navigate(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
            
            if (page === 'home') {
                releasesPage.style.opacity = "0";
                setTimeout(() => {
                    releasesPage.style.display = "none";
                    document.getElementById('imageLayer').style.opacity = "1";
                    document.documentElement.style.scrollSnapType = "y mandatory";
                    window.scrollTo(0, currentIndex * window.innerHeight);
                }, 400);
            } else {
                document.getElementById('imageLayer').style.opacity = "0";
                setTimeout(() => {
                    releasesPage.style.display = "block";
                    setTimeout(() => releasesPage.style.opacity = "1", 50);
                    document.documentElement.style.scrollSnapType = "none";
                    window.scrollTo(0, 0);
                }, 400);
            }
        }

        function jumpTo(position) {
            const val = position === 'top' ? 0 : document.documentElement.scrollHeight;
            window.scrollTo({ top: val, behavior: 'smooth' });
        }

        function openModal() {
            updateModalData();
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateModalData() {
            const track = tracks[currentIndex];
            document.getElementById('fullTitle').innerText = track.title;
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${track.youtubeId}?autoplay=1&modestbranding=1`;
            document.getElementById('youtubeIconLink').href = `https://www.youtube.com/watch?v=${track.youtubeId}`;
            
            document.getElementById('spotifyLink').style.display = track.spotify ? 'block' : 'none';
            document.getElementById('spotifyLink').href = track.spotify;
            document.getElementById('soundcloudLink').style.display = track.soundcloud ? 'block' : 'none';
            document.getElementById('soundcloudLink').href = track.soundcloud;
        }

        function changeTrack(direction) {
            currentIndex = (currentIndex + direction + tracks.length) % tracks.length;
            updateModalData();
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('youtubePlayer').src = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
