<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --snap-type: y mandatory;
        }

        html {
            scroll-snap-type: var(--snap-type);
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Ambient Glow Layer */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 140vmin; /* מעט גדול יותר כדי למנוע קצוות חתוכים בזמן תנועה */
            height: 140vmin;
            object-fit: cover;
            filter: blur(100px) saturate(3) contrast(1.2); 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            will-change: transform, opacity;
        }

        /* Fluid Movement & Breathing Animation */
        @keyframes fluidMove {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, -5%) scale(1.05) rotate(2deg); }
            66% { transform: translate(-3%, 7%) scale(0.95) rotate(-1deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        .ambient-glow.active {
            opacity: 0.45;
            animation: fluidMove 25s ease-in-out infinite;
        }

        /* Central Image Layer */
        .fixed-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-wrapper {
            position: relative;
            width: 85vw;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) translateY(20px);
            filter: blur(15px);
        }

        .main-image.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
            z-index: 20;
        }

        /* Scroll Sections */
        .scroll-section {
            height: 100vh;
            scroll-snap-align: start;
        }

        /* RELEASES Page (Hidden Overlay) */
        #releases-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 1000;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 6rem 2rem;
            box-sizing: border-box;
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        .release-card {
            background: rgba(255,255,255,0.03);
            border-radius: 0.5rem;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .release-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
        }

        /* Social Section At Bottom of Home */
        .social-section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 100;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 75%);
        }

        .social-link {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            transition: all 0.4s ease;
            margin: 0.5rem 0;
            display: block;
        }

        .social-link:hover {
            color: #fff;
            letter-spacing: 0.4em;
            transform: scale(1.05);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.35rem;
            border-radius: 4rem;
            display: flex;
            gap: 0.2rem;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* MODAL LIQUID GLASS STYLE */
        #modal {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 3000;
        }

        #modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(1.8);
            -webkit-backdrop-filter: blur(60px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 2rem;
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            color: rgba(255,255,255,0.4);
        }

        /* Brand Specific Hover Effects */
        .btn-spotify:hover {
            background: rgba(30, 215, 96, 0.15);
            border-color: rgba(30, 215, 96, 0.5);
            color: #1ED760;
            box-shadow: 0 0 15px rgba(30, 215, 96, 0.2);
            transform: translateY(-2px);
        }

        .btn-soundcloud:hover {
            background: rgba(255, 51, 0, 0.15);
            border-color: rgba(255, 51, 0, 0.5);
            color: #FF3300;
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.2);
            transform: translateY(-2px);
        }

        .btn-youtube:hover {
            background: rgba(255, 0, 0, 0.15);
            border-color: rgba(255, 0, 0, 0.5);
            color: #FF0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .scroll-dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .scroll-dot.active {
            background: #fff;
            transform: scale(1.8);
        }

        .jump-btn-integrated {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

    <script>
        const tracks = [

        ];

        let currentIndex = 0;
        let activeLayer = 1;
        let isReleasesOpen = false;

        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const releasesGrid = document.getElementById('releasesGrid');
        const releasesPage = document.getElementById('releases-page');
        const scrollArea = document.getElementById('scrollArea');
        const sideNav = document.getElementById('side-nav');

        // Setup sections
        const totalHomeSections = tracks.length + 1;
        for(let i=0; i < tracks.length; i++) {
            const sec = document.createElement('div');
            sec.className = 'scroll-section';
            scrollArea.appendChild(sec);
        }

        // Setup dots
        for(let i=0; i < totalHomeSections; i++) {
            const dot = document.createElement('div');
            dot.className = `scroll-dot ${i === 0 ? 'active' : ''}`;
            dot.id = `dot-${i}`;
            dot.onclick = () => {
                if(isReleasesOpen) navigate('home');
                window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
            };
            scrollIndicator.appendChild(dot);
        }

        // Fill Releases Grid
        tracks.forEach((track, i) => {
            const card = document.createElement('div');
            card.className = 'release-card';
            card.onclick = () => { openModal(i); };
            card.innerHTML = `<div class="aspect-square bg-zinc-900"><img src="${track.src}" class="w-full h-full object-cover"></div>
                             <div class="p-4 text-[10px] tracking-[0.2em] uppercase text-white/90 truncate text-left" dir="ltr">${track.title}</div>`;
            releasesGrid.appendChild(card);
        });

        img1.src = tracks[0].src; glow1.src = tracks[0].src;
        img2.src = tracks[0].src; glow2.src = tracks[0].src;

        window.addEventListener('scroll', () => {
            if (isReleasesOpen) return;
            const scrollPos = window.scrollY;
            const idx = Math.min(totalHomeSections - 1, Math.floor((scrollPos + window.innerHeight/2) / window.innerHeight));
            
            if (idx === tracks.length) {
                document.getElementById('imageLayer').style.opacity = "0";
            } else if (idx < tracks.length) {
                document.getElementById('imageLayer').style.opacity = "1";
                if (idx !== currentIndex) {
                    currentIndex = idx;
                    updateUI(idx);
                }
            }
            
            document.querySelectorAll('.scroll-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`)?.classList.add('active');
        });

        function updateUI(idx) {
            const [nextImg, currImg] = activeLayer === 1 ? [img2, img1] : [img1, img2];
            const [nextGlow, currGlow] = activeLayer === 1 ? [glow2, glow1] : [glow1, glow2];
            nextImg.src = tracks[idx].src; nextGlow.src = tracks[idx].src;
            nextImg.classList.add('active'); nextGlow.classList.add('active');
            currImg.classList.remove('active'); currGlow.classList.remove('active');
            activeLayer = activeLayer === 1 ? 2 : 1;
        }

        function navigate(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');

            if (page === 'home' || page === 'social') {
                isReleasesOpen = false;
                releasesPage.style.opacity = "0";
                setTimeout(() => { releasesPage.style.display = "none"; }, 500);
                document.documentElement.style.setProperty('--snap-type', 'y mandatory');
                sideNav.style.opacity = "1";
                sideNav.style.pointerEvents = "auto";
                const target = page === 'home' ? 0 : tracks.length * window.innerHeight;
                window.scrollTo({ top: target, behavior: 'smooth' });
            } 
            else if (page === 'releases') {
                isReleasesOpen = true;
                releasesPage.style.display = "block";
                setTimeout(() => { releasesPage.style.opacity = "1"; }, 10);
                document.documentElement.style.setProperty('--snap-type', 'none');
                document.getElementById('imageLayer').style.opacity = "0";
                sideNav.style.opacity = "0";
                sideNav.style.pointerEvents = "none";
            }
        }

        function jumpTo(pos) {
            if (isReleasesOpen) return;
            window.scrollTo({ top: pos === 'top' ? 0 : (tracks.length) * window.innerHeight, behavior: 'smooth' });
        }

        function openModal(index) {
            const track = tracks[index];
            document.getElementById('fullTitle').innerText = track.title;
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${track.youtubeId}?autoplay=1`;
            
            // Update links
            document.getElementById('linkSpotify').href = track.spotify || "#";
            document.getElementById('linkSoundcloud').href = track.sc || "#";
            document.getElementById('linkYoutube').href = `https://youtube.com/watch?v=${track.youtubeId}`;
            
            const modal = document.getElementById('modal');
            const frame = document.getElementById('modalFrame');
            modal.classList.add('active');
            setTimeout(() => { frame.classList.remove('scale-95'); frame.classList.add('scale-100'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const frame = document.getElementById('modalFrame');
            frame.classList.remove('scale-100');
            frame.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('active');
                document.getElementById('youtubePlayer').src = "";
                document.body.style.overflow = 'auto';
            }, 300);
        }
    </script>
</body>
</html>
